[project]
site_name = "VelocityFL"
site_description = "The uv of Federated Learning — Rust-backed orchestration with Python ergonomics"
site_author = "VelocityFL Contributors"
site_url = "https://ajbarea.github.io/vFL/"
copyright = "AJ Barea · 2026"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "CLI Reference" = "cli.md" },
  { "Architecture" = "architecture.md" },
  { "Configuration" = "configuration.md" },
  { "Strategies" = "strategies.md" },
  { "Attacks" = "attacks.md" },
  { "API Reference" = "api.md" },
  { "Convergence" = "convergence.md" },
  { "Benchmarks" = "benchmarks.md" },
  { "Skills" = "skills.md" },
]

extra_css = ["style.css"]
extra_javascript = ["javascripts/reveal.js"]

[project.theme]
name = "material"
language = "en"

features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "search.highlight",
  "search.suggest",
]

[[project.theme.palette]]
scheme = "slate"
primary = "deep-purple"
accent = "purple"

[[project.theme.palette]]
scheme = "default"
primary = "deep-purple"
accent = "purple"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
logo = "material/scatter-plot"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajbarea/vFL"
name = "VelocityFL on GitHub"
