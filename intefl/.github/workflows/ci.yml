name: CI Pipeline
'on':
  push:
    branches:
      - main
      - aj-ux-enhancements
  pull_request:
    branches:
      - main
jobs:
  test:
    name: 'Test (Python ${{ matrix.python-version }})'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.9.26
          enable-cache: true
      - name: Install dependencies
        run: 'uv sync --frozen --python ${{ matrix.python-version }}'
      - name: Run unit tests (parallel)
        run: >
          uv run coverage run --append --source=intellifl -m pytest -n auto
          tests/unit/ --tb=short
      - name: Run integration tests (serial)
        run: >
          uv run coverage run --append --source=intellifl -m pytest
          tests/integration/ --tb=short
      - name: Run performance tests (serial)
        run: >
          uv run coverage run --append --source=intellifl -m pytest
          tests/performance/ --tb=short
      - name: Generate final coverage report
        run: |
          uv run coverage report --show-missing
          uv run coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          token: '${{ secrets.CODECOV_TOKEN }}'
          slug: ajbarea/phalanx-fl
          files: tests/logs/coverage.xml
          fail_ci_if_error: true
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.9.26
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run smoke tests
        run: |
          uv run python -m tests.scripts.ci_smoke_test
