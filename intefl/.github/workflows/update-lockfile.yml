name: Update Lock File

# This workflow can be run manually or on a schedule
on:
  workflow_dispatch:  # Manual trigger
  schedule:
    # Run monthly on the 1st at 2am UTC
    - cron: '0 2 1 * *'

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.26"

      - name: Update lock file
        run: |
          # Update all dependencies to latest compatible versions
          uv lock --upgrade

      - name: Check if there are changes
        id: check_changes
        run: |
          if git diff --quiet uv.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update uv.lock to latest compatible versions"
          title: "Update dependencies (uv.lock)"
          body: |
            ## 📦 Dependency Update

            This PR updates all dependencies to their latest compatible versions within the constraints defined in `pyproject.toml`.

            **Generated by:** Automated lock file update workflow
            **Updated:** `uv.lock`

            ### What changed?
            - All dependencies updated to latest versions compatible with `pyproject.toml` constraints

            ### Before merging:
            - [ ] Review the changes in `uv.lock`
            - [ ] Ensure CI passes
            - [ ] Check for any breaking changes in major version updates

            ### Testing
            All automated tests will run on this PR. Review test results before merging.
          branch: chore/update-lockfile
          delete-branch: true
          labels: |
            dependencies
            automated
