[project]
site_name = "Kourai Khryseai"
site_description = "Ten AI agents, three ways to play. Collaborate with specialized agents in real-time through CLI, Pygame GUI, or a Ren'Py visual novel."
site_author = "AJ Barea"
copyright = "AJ Barea &middot; 2026"
extra_css = [
  "stylesheets/variables.css",
  "stylesheets/base.css",
  "stylesheets/mermaid.css",
  "stylesheets/components/hero.css",
  "stylesheets/components/landing.css",
  "stylesheets/components/lightbox.css"
]
extra_javascript = ["javascripts/particles.js"]

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav = [
  { "Home" = "index.md" },
  { "Overview" = "overview.md" },
  { "Getting Started" = "getting-started.md" },
  { "Agents" = [
      { "Overview" = "agents/index.md" },
      { "Specialists" = "agents/specialists.md" },
  ]},
  { "Architecture" = [
      { "Overview" = "architecture/index.md" },
      { "Internals" = "architecture/internals.md" },
      { "Infrastructure" = "architecture/infrastructure.md" },
  ]},
  { "Interfaces" = [
      { "CLI Reference" = "cli.md" },
      { "GUI Reference" = "gui.md" },
      { "VN Reference" = "vn.md" },
  ]},
  { "Configuration" = "configuration.md" },
  { "Pricing" = "pricing.md" },
]

# ---------------------------------------------------------------------------
# Theme & Visuals
# ---------------------------------------------------------------------------
[project.theme]
name = "material" # Zensical uses 'material' as the foundation
language = "en"
icon.logo = "material/robot"
font.text = "Inter"
font.code = "JetBrains Mono"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
    "search.share",
]

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"

# ---------------------------------------------------------------------------
# Plugins & Extensions
# ---------------------------------------------------------------------------
[project.plugins]
search = { engine = "disco" } # Enable the 2026 'Disco' search engine
social = {}



# ---------------------------------------------------------------------------
# Social & Metadata
# ---------------------------------------------------------------------------
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajbarea/kourai-khryseai"
name = "Kourai Khryseai on GitHub"
