[project]
site_name = "Orchestrate Triage"
site_description = "A multi-domain support-triage AI agent built solo for HackerRank Orchestrate (May 2026). Terminal-based, Claude Opus 4.7, corpus-stuffed prompt caching, prompt-injection-defended."
site_author = "AJ Barea"
site_url = "https://ajbarea.github.io/orchestrate-triage/"
copyright = "AJ Barea · 2026"
extra_css = [
  "stylesheets/variables.css",
  "stylesheets/base.css",
  "stylesheets/mermaid.css",
]

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav = [
  { "Home" = "index.md" },
  { "Overview" = "overview.md" },
  { "Getting Started" = "getting-started.md" },
  { "Architecture" = [
      { "Overview" = "architecture/index.md" },
      { "Corpus & Caching" = "architecture/corpus.md" },
      { "Prompt-Injection Defense" = "architecture/safety.md" },
      { "Cost & Determinism" = "architecture/cost.md" },
  ]},
  { "Reference" = "reference.md" },
]

# ---------------------------------------------------------------------------
# Theme & Visuals
# ---------------------------------------------------------------------------
[project.theme]
name = "material"
language = "en"
custom_dir = "overrides"
icon.logo = "material/account-tie-voice"
favicon = "assets/favicon.svg"
font.text = "Inter"
font.code = "JetBrains Mono"

features = [
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
    "search.share",
]

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"

# ---------------------------------------------------------------------------
# Plugins & Extensions
# ---------------------------------------------------------------------------
[project.plugins]
search = { engine = "disco" }
social = {}

# ---------------------------------------------------------------------------
# Social & Metadata
# ---------------------------------------------------------------------------
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajbarea/orchestrate-triage"
name = "orchestrate-triage on GitHub"
