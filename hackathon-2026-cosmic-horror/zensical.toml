[project]
site_name = "Cosmic Horror"
site_description = "Biosignal-controlled music — BioRadio Hackathon 2026"
site_author = "Team Cosmic Horror"
copyright = "Team Cosmic Horror &middot; BioRadio Hackathon 2026"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Architecture" = "architecture.md" },
  { "MIDI Engine" = "midi-engine.md" },
  { "Playlist" = "playlist.md" },
]

extra_css = ["stylesheets/extra.css"]

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
[project.theme]
language = "en"

features = [
    "content.code.copy",
    "content.code.select",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# ---------------------------------------------------------------------------
# Color palette — dark theme by default; light theme for pain
# ---------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "slate"
primary = "deep-purple"
accent = "amber"
toggle.icon = "material/brightness-4"
toggle.name = "Expose yourself to the light"

[[project.theme.palette]]
scheme = "default"
primary = "deep-purple"
accent = "amber"
toggle.icon = "material/brightness-7"
toggle.name = "Return to the safety of the void"

# ---------------------------------------------------------------------------
# Fonts
# ---------------------------------------------------------------------------
[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# ---------------------------------------------------------------------------
# Icon
# ---------------------------------------------------------------------------
[project.theme.icon]
logo = "material/music-note"

# ---------------------------------------------------------------------------
# Footer
# ---------------------------------------------------------------------------
[project.extra]
generator = false
